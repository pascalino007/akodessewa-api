name: Deploy to VPS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Generate Prisma Client
      run: npx prisma generate
    
   # - name: Run linting
    #  run: npm run lint
    
    - name: Build application
      run: npm run build
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Generate Prisma Client
      run: npx prisma generate
    
    - name: Build application
      run: npm run build
    
    - name: Create deployment package
      run: |
        tar -czf deploy.tar.gz \
          dist/ \
          node_modules/ \
          package.json \
          package-lock.json \
          prisma/ \
          .env.example
    
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 168.231.101.119
        username: root
        password: Android@2026
        script: |
          # Create deployment directory if it doesn't exist
          mkdir -p /akodessewa-api
          cd /akodessewa-api
          
          # Backup current deployment
          if [ -d "backup" ]; then rm -rf backup; fi
          if [ -d "dist" ]; then mv dist backup; fi
          if [ -d "node_modules" ]; then mv node_modules backup/; fi
          if [ -f "package.json" ]; then mv package.json backup/; fi
          if [ -f "package-lock.json" ]; then mv package-lock.json backup/; fi
          if [ -d "prisma" ]; then mv prisma backup/; fi
          
          # Stop running application
          if pm2 list | grep -q "akodessewa-api"; then
            pm2 stop akodessewa-api
            pm2 delete akodessewa-api
          fi
          
          # Clean up old files
          rm -rf dist node_modules package.json package-lock.json prisma
    
    - name: Upload files to VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: 168.231.101.119
        username: root
        password: Android@2026
        source: "deploy.tar.gz"
        target: "/akodessewa-api/"
        strip_components: 0
    
    - name: Extract and setup on VPS
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 168.231.101.119
        username: root
        password: Android@2026
        script: |
          cd /akodessewa-api
          
          # Extract deployment package
          tar -xzf deploy.tar.gz
          rm deploy.tar.gz
          
          # Run database migrations
          npm run prisma:migrate:prod
          
          # Start the application with PM2 on port 4045
          PORT=4045 pm2 start dist/main.js --name "akodessewa-api"
          
          # Save PM2 configuration
          pm2 save
          pm2 startup
          
          # Verify application is running
          sleep 5
          if pm2 list | grep -q "akodessewa-api"; then
            echo "Application started successfully on port 4045"
            pm2 status
          else
            echo "Application failed to start"
            pm2 logs akodessewa-api --lines 20
            exit 1
          fi
